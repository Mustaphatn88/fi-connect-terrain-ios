name: Deploy Terrain PWA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'terrain-pwa/**'
      - '.github/workflows/deploy-terrain-pwa.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: terrain-pwa-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: terrain-pwa/package-lock.json

      - name: Install dependencies
        working-directory: terrain-pwa
        run: npm ci

      - name: Build PWA
        working-directory: terrain-pwa
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: terrain-pwa/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
