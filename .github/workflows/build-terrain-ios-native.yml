name: Build Terrain iOS Native

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      export_signed_ipa:
        description: "Construire aussi une IPA signée (nécessite les secrets Apple)"
        required: true
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - 'terrain-ios/**'
      - '.github/workflows/build-terrain-ios-native.yml'

permissions:
  contents: read

jobs:
  build-simulator:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: terrain-ios
        run: xcodegen generate

      - name: Build for iOS Simulator (unsigned)
        working-directory: terrain-ios
        run: |
          set -o pipefail
          xcodebuild \
            -project BioplusTerrainIOS.xcodeproj \
            -scheme BioplusTerrainIOS \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            clean build | tee build-simulator.log

      - name: Upload simulator build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terrain-ios-build-log
          path: terrain-ios/build-simulator.log
          if-no-files-found: ignore

  export-signed-ipa:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.export_signed_ipa == true }}
    needs: build-simulator
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    env:
      IOS_DEVELOPMENT_TEAM: ${{ secrets.IOS_DEVELOPMENT_TEAM }}
      IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
      IOS_EXPORT_METHOD: ${{ vars.IOS_EXPORT_METHOD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Apple secrets
        run: |
          missing=0
          for key in IOS_DEVELOPMENT_TEAM IOS_CERTIFICATE_P12_BASE64 IOS_CERTIFICATE_PASSWORD IOS_PROVISIONING_PROFILE_BASE64 IOS_KEYCHAIN_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error ::Secret manquant: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: terrain-ios
        run: xcodegen generate

      - name: Prepare signing assets
        working-directory: terrain-ios
        run: |
          CERT_PATH="$RUNNER_TEMP/ios_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/fi-connect.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/fi-connect-signing.keychain-db"

          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/fi-connect.mobileprovision"

          PROFILE_INFO="$RUNNER_TEMP/profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_INFO"
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_INFO")
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Archive app
        working-directory: terrain-ios
        run: |
          set -o pipefail
          xcodebuild \
            -project BioplusTerrainIOS.xcodeproj \
            -scheme BioplusTerrainIOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/BioplusTerrainIOS.xcarchive" \
            DEVELOPMENT_TEAM="$IOS_DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            clean archive | tee archive.log

      - name: Create export options
        run: |
          method="${IOS_EXPORT_METHOD:-ad-hoc}"
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${method}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${IOS_DEVELOPMENT_TEAM}</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          mkdir -p "$RUNNER_TEMP/exported-ipa"
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/BioplusTerrainIOS.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/exported-ipa"

      - name: Upload signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: terrain-ios-signed-ipa
          path: |
            ${{ runner.temp }}/exported-ipa/*.ipa
            ${{ runner.temp }}/BioplusTerrainIOS.xcarchive
            terrain-ios/archive.log
